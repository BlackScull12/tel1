<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<!-- USERS LIST -->
<div class="users" id="usersList"></div>

<!-- CHAT SECTION -->
<div class="chat">

<div class="chatHeader">

<span id="chatUser">Select a user</span>

<div class="chatIcons">
<span class="call">📞</span>
<span id="clearChat">🗑</span>
</div>

</div>

<div class="chatArea" id="chatBox"></div>

<div class="inputArea">
<input id="messageInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
